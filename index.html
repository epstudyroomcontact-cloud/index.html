<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">EP STUDY | INTERSTELLAR COMMAND</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --space-bg: #02020a;
            --accent: #ff7da3;
            --live: #00ff88;
            --glass: rgba(15, 15, 35, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e0ff;
            --glow: 0 0 25px rgba(255, 125, 163, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--space-bg); color: var(--text); 
            min-height: 100vh; overflow-x: hidden; 
            display: flex; flex-direction: column; align-items: center; 
        }

        /* --- BACKGROUND --- */
        .universe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a0a20 0%, #02020a 100%); }
        .nebula { 
            position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
            background: radial-gradient(circle at 30% 50%, rgba(255,125,163,0.07) 0%, transparent 40%),
                        radial-gradient(circle at 70% 20%, rgba(100,150,255,0.07) 0%, transparent 35%);
            filter: blur(60px); animation: nebulaRotate 120s infinite linear;
        }
        @keyframes nebulaRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; }
        .star-blink { animation: starBlink var(--d) infinite alternate; }
        @keyframes starBlink { 0% { opacity: 0.1; transform: scale(0.8); } 100% { opacity: 0.9; transform: scale(1.3); } }

        /* --- CONTAINER --- */
        .container { width: 95%; max-width: 1400px; padding: 20px 0 50px 0; z-index: 1; }
        
        header { text-align: center; margin-bottom: 30px; }
        header h1 { 
            font-size: clamp(1.5rem, 6vw, 3.5rem); font-weight: 800; color: var(--accent); 
            text-shadow: var(--glow); letter-spacing: 4px; text-transform: uppercase;
        }

        #comm-hub { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .comm-link { 
            color: var(--text); text-decoration: none; font-size: 10px; font-weight: 700; 
            padding: 8px 16px; border-radius: 50px; border: 1px solid var(--border); 
            background: rgba(255,255,255,0.03); transition: 0.3s;
        }
        .comm-link:hover { border-color: var(--accent); background: rgba(255,125,163,0.1); }

        /* --- NAV BAR --- */
        .nav-bar { 
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px;
            background: var(--glass); border: 1px solid var(--border); padding: 15px 25px; 
            border-radius: 30px; margin-bottom: 30px; backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @media (max-width: 850px) {
            .nav-bar { grid-template-columns: 1fr; text-align: center; border-radius: 20px; padding: 20px; }
            .nav-center { order: -1; }
        }

        .nav-left { display: flex; flex-direction: column; gap: 8px; }
        .nav-controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        
        #live-clock { font-family: 'JetBrains Mono'; font-weight: 800; color: var(--accent); font-size: 1.5rem; letter-spacing: 2px; text-shadow: var(--glow); }

        .week-picker { 
            display: flex; align-items: center; justify-content: center; gap: 12px; 
            background: rgba(255,255,255,0.03); padding: 8px 20px; border-radius: 100px; border: 1px solid var(--border);
        }

        select, .week-btn {
            background: rgba(0,0,0,0.5); color: #fff; border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 15px; font-size: 10px; font-weight: 600; cursor: pointer;
            outline: none;
        }

        /* --- GRID --- */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; }
        @media (max-width: 1100px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 850px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
        @media (max-width: 400px) { .grid { grid-template-columns: 1fr; } }

        .card { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 30px; padding: 25px 15px; 
            text-align: center; transition: 0.4s; backdrop-filter: blur(10px);
        }
        .card.today { border-color: var(--accent); background: rgba(255,125,163,0.08); box-shadow: var(--glow); }

        .slot { 
            background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px 5px; 
            margin-bottom: 12px; border: 1px solid transparent; 
        }
        .slot.active { background: rgba(255,255,255,0.06); }
        .slot.is-live { border: 1px solid var(--live); background: rgba(0, 255, 136, 0.1); animation: livePulse 2s infinite; }
        @keyframes livePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        .s-time { font-family: 'JetBrains Mono'; font-size: 1.1rem; font-weight: 700; color: rgba(255,255,255,0.1); }
        .slot.active .s-time { color: #fff; }
        .slot.is-live .s-time { color: var(--live); }

        /* --- ADMIN --- */
        #admin { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; background: #050512; z-index: 1000; padding: 30px; border-left: 1px solid var(--accent); overflow-y: auto; transition: 0.5s; }
        #admin.open { right: 0; }
        .admin-sec { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        label { font-size: 10px; font-weight: 800; color: var(--accent); display: block; margin-bottom: 8px; }
        input { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 10px; border-radius: 10px; margin-bottom: 10px; outline: none; font-size: 12px; }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div class="universe" id="universe"><div class="nebula"></div></div>
    
    <div class="container">
        <header>
            <h1 id="brand-name" onclick="toggleAdmin()">EP INTERSTELLAR</h1>
            <div id="comm-hub"></div>
        </header>

        <div class="nav-bar">
            <div class="nav-left">
                <div class="nav-controls">
                    <select id="sel-lang" onchange="setLang(this.value)">
                        <option value="vi">🇻🇳 Tiếng Việt</option>
                        <option value="en">🇺🇸 English</option>
                        <option value="ja">🇯🇵 日本語</option>
                        <option value="ko">🇰🇷 한국어</option>
                        <option value="zh">🇨🇳 中文</option>
                        <option value="fr">🇫🇷 Français</option>
                        <option value="es">🇪🇸 Español</option>
                    </select>
                    <select id="sel-tz" onchange="updateTZ(this.value)"></select>
                </div>
                <div id="tz-display" style="font-family:'JetBrains Mono'; font-size:9px; color:var(--accent); opacity:0.7; text-align: center;">Syncing Satellite...</div>
            </div>

            <div class="nav-center"><div id="live-clock">00:00:00</div></div>
            
            <div class="nav-right">
                <div class="week-picker">
                    <button class="week-btn" onclick="changeWeek(-1)">❮</button>
                    <span id="week-label" style="font-family:'JetBrains Mono'; font-size:10px; letter-spacing:1px; min-width:110px; text-align:center;">---</span>
                    <button class="week-btn" onclick="changeWeek(1)">❯</button>
                </div>
            </div>
        </div>
        
        <main class="grid" id="main-grid"></main>
    </div>

    <div id="admin">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="color:var(--accent); font-size: 1.2rem;">STATION CONTROL</h2>
            <span onclick="toggleAdmin()" style="cursor:pointer; font-size:24px;">✕</span>
        </div>
        <div class="admin-sec">
            <label>Branding & Live</label>
            <input id="ad-brand" placeholder="Station Name">
            <input id="ad-live-url" placeholder="Live Link">
        </div>
        <div class="admin-sec">
            <label>Social JSON</label>
            <input id="ad-contacts" placeholder='{"Instagram": "url"}'>
        </div>
        <div id="ad-fields"></div>
        <button class="btn-main" onclick="save()">SAVE TO CLOUD</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLp6sfgO6WR53RbfXMoU1RV9ROBmOHuQI",
        authDomain: "epstudyroom-bacaf.firebaseapp.com",
        projectId: "epstudyroom-bacaf",
        storageBucket: "epstudyroom-bacaf.firebasestorage.app",
        messagingSenderId: "189256681520",
        appId: "1:189256681520:web:28a61a58628754b490c5f5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const DT = luxon.DateTime;

    let daysArray = [], weekOffset = 0, userLang = 'vi', userTZ = DT.local().zoneName;
    let stationName = "EP INTERSTELLAR", contacts = {}, socialLinks = {};

    const i18n = {
        vi: { days: ["THỨ HAI","THỨ BA","THỨ TƯ","THỨ NĂM","THỨ SÁU","THỨ BẢY","CHỦ NHẬT"], label: "Múi giờ" },
        en: { days: ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY","SUNDAY"], label: "Timezone" },
        ja: { days: ["月曜日","火曜日","水曜日","木曜日","金曜日","土曜日","日曜日"], label: "現地時間" },
        ko: { days: ["월요일","화요일","수요일","목요일","금요일","토요일","일요일"], label: "시간대" },
        zh: { days: ["星期一","星期二","星期三","星期四","星期五","星期六","星期日"], label: "时区" },
        fr: { days: ["LUNDI","MARDI","MERCREDI","JEUDI","VENDREDI","SAMEDI","DIMANCHE"], label: "Fuseau" },
        es: { days: ["LUNES","MARTES","MIÉRCOLES","JUEVES","VIERNES","SÁBADO","DOMINGO"], label: "Zona horaria" }
    };

    const zones = [
        { n: "🛰️ AUTO DETECT", v: "auto" },
        { n: "🇻🇳 VIETNAM", v: "Asia/Ho_Chi_Minh" },
        { n: "🇺🇸 NEW YORK", v: "America/New_York" },
        { n: "🇬🇧 LONDON", v: "Europe/London" },
        { n: "🇯🇵 TOKYO", v: "Asia/Tokyo" },
        { n: "🇰🇷 SEOUL", v: "Asia/Seoul" },
        { n: "🇦🇺 SYDNEY", v: "Australia/Sydney" },
        { n: "🇫🇷 PARIS", v: "Europe/Paris" }
    ];

    function initUniverse() {
        const uv = document.getElementById('universe');
        for(let i=0; i<100; i++) {
            const s = document.createElement('div');
            s.className = 'star star-blink';
            const size = Math.random()*2;
            s.style.width = size+'px'; s.style.height = size+'px';
            s.style.top = Math.random()*100+'vh'; s.style.left = Math.random()*100+'vw';
            s.style.setProperty('--d', (Math.random()*5+2)+'s');
            uv.appendChild(s);
        }
    }

    function getWeekKey() {
        const d = DT.now().setZone("Asia/Ho_Chi_Minh").plus({ weeks: weekOffset }).startOf('week');
        return `${d.year}-W${d.weekNumber}`;
    }

    function listen() {
        db.collection("settings").doc("branding").onSnapshot(doc => {
            if(doc.exists) {
                const data = doc.data();
                stationName = data.name || "EP INTERSTELLAR";
                contacts = data.contacts || {};
                socialLinks = data.socialLinks || {};
                document.getElementById('brand-name').innerText = stationName;
                renderContacts();
            }
        });
        if (window.unsub) window.unsub();
        window.unsub = db.collection("weekly_schedules").doc(getWeekKey()).onSnapshot(doc => {
            daysArray = doc.exists ? doc.data().days : Array(7).fill({m:"", a:"", e:""});
            render();
        });
    }

    function render() {
        const grid = document.getElementById('main-grid'); grid.innerHTML = "";
        const nowVN = DT.now().setZone("Asia/Ho_Chi_Minh");
        const startVN = nowVN.plus({ weeks: weekOffset }).startOf('week');
        const lang = i18n[userLang];
        
        document.getElementById('week-label').innerText = `${startVN.toFormat('dd/MM')} - ${startVN.plus({days:6}).toFormat('dd/MM')}`;
        document.getElementById('tz-display').innerText = `📡 ${lang.label}: ${userTZ.replace('_', ' ')}`;

        for(let i=0; i<7; i++) {
            const dateVN = startVN.plus({ days: i });
            const data = daysArray[i] || {m:"", a:"", e:""};
            const isToday = nowVN.hasSame(dateVN, 'day');
            
            const card = document.createElement('div');
            card.className = `card ${isToday?'today':''}`;

            let h = `<span style="font-size:11px; color:var(--accent); font-weight:800; letter-spacing:1px;">${lang.days[i]}</span>
                     <span style="display:block; font-size:9px; opacity:0.4; margin-bottom:15px;">${dateVN.toFormat('dd/MM')}</span>`;
            
            ['m','a','e'].forEach((k, idx) => {
                const raw = (data[k]||"").trim();
                const valid = /^([01]\d|2[0-3]):([0-5]\d)$/.test(raw);
                let displayTime = "--:--", isLive = false;

                if(valid) {
                    const sessionTimeVN = DT.fromFormat(raw, "HH:mm", {zone: "Asia/Ho_Chi_Minh"}).set({year:dateVN.year, month:dateVN.month, day:dateVN.day});
                    displayTime = sessionTimeVN.setZone(userTZ).toFormat("HH:mm");
                    
                    const nowInUserTZ = DT.now().setZone(userTZ);
                    const sessionInUserTZ = sessionTimeVN.setZone(userTZ);
                    if(nowInUserTZ >= sessionInUserTZ && nowInUserTZ <= sessionInUserTZ.plus({hours: 2})) isLive = true;
                }
                
                h += `<div class="slot ${valid?'active':''} ${isLive?'is-live':''}">
                        <div style="font-size:14px; opacity: ${valid?1:0.2};">${['🫧','🪐','✨'][idx]}</div>
                        <div class="s-time">${displayTime}</div>
                      </div>`;
            });
            card.innerHTML = h;
            grid.appendChild(card);
        }
    }

    function renderContacts() {
        const hub = document.getElementById('comm-hub'); hub.innerHTML = "";
        if(contacts.live) hub.innerHTML += `<a href="${contacts.live}" target="_blank" class="comm-link" style="border-color:var(--live); color:var(--live)">● LIVE</a>`;
        Object.entries(socialLinks).forEach(([name, url]) => {
            hub.innerHTML += `<a href="${url}" target="_blank" class="comm-link">${name.toUpperCase()}</a>`;
        });
    }

    function toggleAdmin() {
        const ad = document.getElementById('admin');
        if(!ad.classList.contains('open')) {
            if(prompt("Code:") !== "hottea68") return;
            document.getElementById('ad-brand').value = stationName;
            document.getElementById('ad-live-url').value = contacts.live || "";
            document.getElementById('ad-contacts').value = JSON.stringify(socialLinks);
            const fields = document.getElementById('ad-fields'); fields.innerHTML = "";
            ["MON","TUE","WED","THU","FRI","SAT","SUN"].forEach((day, i) => {
                const d = daysArray[i] || {m:"", a:"", e:""};
                fields.innerHTML += `<div class="admin-sec"><label>${day}</label><div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;">
                    <input id="m-${i}" value="${d.m}" placeholder="08:00"><input id="a-${i}" value="${d.a}" placeholder="14:00"><input id="e-${i}" value="${d.e}" placeholder="20:00"></div></div>`;
            });
            ad.classList.add('open');
        } else ad.classList.remove('open');
    }

    async function save() {
        try {
            const socialData = JSON.parse(document.getElementById('ad-contacts').value || "{}");
            await db.collection("settings").doc("branding").set({ 
                name: document.getElementById('ad-brand').value, 
                contacts: { live: document.getElementById('ad-live-url').value },
                socialLinks: socialData 
            });
            const newDays = [];
            for(let i=0; i<7; i++) {
                newDays.push({ m: document.getElementById(`m-${i}`).value, a: document.getElementById(`a-${i}`).value, e: document.getElementById(`e-${i}`).value });
            }
            await db.collection("weekly_schedules").doc(getWeekKey()).set({ days: newDays });
            alert("Updated!"); toggleAdmin();
        } catch(e) { alert("Format Error!"); }
    }

    function updateTZ(v) { userTZ = (v === 'auto') ? DT.local().zoneName : v; render(); }
    function setLang(l) { userLang = l; render(); }
    function changeWeek(n) { weekOffset += n; listen(); }

    document.getElementById('sel-tz').innerHTML = zones.map(z => `<option value="${z.v}">${z.n}</option>`).join('');
    initUniverse();
    listen();
    setInterval(() => { document.getElementById('live-clock').innerText = DT.now().setZone(userTZ).toFormat('HH:mm:ss'); }, 1000);
</script>
</body>
</html>
