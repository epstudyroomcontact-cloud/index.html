<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EP Study Room | Global Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #c3a6ff; --bg: #050508; --card: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.1); --live: #00ff88; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; padding: 15px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .bg-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050508 100%); }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; opacity: 0.15; mask-image: radial-gradient(ellipse at center, black, transparent 90%); }
        .container { width: 100%; max-width: 1400px; z-index: 1; margin-top: 70px; }
        header { text-align: center; position: relative; margin-bottom: 5px; cursor: pointer; }
        header h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(1.5rem, 6vw, 2.5rem); letter-spacing: 6px; text-transform: uppercase; background: linear-gradient(90deg, #fff, var(--primary), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200%; animation: shine 5s linear infinite; }
        .status-bar { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); padding: 12px 25px; border-radius: 50px; display: flex; align-items: center; gap: 15px; margin: 20px auto; backdrop-filter: blur(15px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); justify-content: space-between; min-width: 330px; }
        #live-clock { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; color: var(--live); }
        #week-range { font-size: 0.8rem; font-weight: 600; color: #aaa; }
        .nav-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; cursor: pointer; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .nav-btn:hover { background: var(--primary); color: #000; transform: scale(1.1); }
        .grid { display: grid; gap: 15px; width: 100%; grid-template-columns: repeat(7, 1fr); }
        @media (max-width: 1300px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 850px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px 15px; text-align: center; transition: 0.4s; position: relative; }
        .card.today { border: 1px solid var(--primary); background: rgba(195, 166, 255, 0.07); box-shadow: 0 0 20px rgba(195,166,255,0.1); }
        .day-label { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; color: var(--primary); text-transform: uppercase; margin-bottom: 2px; }
        .date-label { font-size: 0.65rem; color: #555; margin-bottom: 18px; display: block; }
        .session { margin-bottom: 10px; padding: 12px; border-radius: 18px; background: rgba(255,255,255,0.02); border: 1px solid transparent; transition: 0.3s; }
        .session.active-now { border-color: var(--live); background: rgba(0, 255, 136, 0.05); animation: pulse 2s infinite; }
        .s-name { font-size: 0.55rem; color: #777; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .s-time { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 600; }
        #admin-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh; background: #0a0a0f; z-index: 1000; padding: 30px; transition: 0.4s; border-left: 1px solid var(--border); overflow-y: auto; }
        #admin-panel.open { right: 0; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #1a1a24; border: 1px solid #333; color: #fff; border-radius: 8px; }
        .save-btn { width: 100%; padding: 15px; background: var(--primary); border: none; font-weight: bold; margin-top: 20px; border-radius: 12px; cursor: pointer; color: #000; }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }
    </style>
</head>
<body>
<div class="bg-effect"></div><div class="bg-grid"></div>
<div class="container">
    <header onclick="login()"><h1 id="display-title">EP STUDY ROOM</h1></header>
    <div style="display: flex; justify-content: center;">
        <div class="status-bar">
            <button class="nav-btn" onclick="changeWeek(-1)">❮</button>
            <div style="text-align: center; min-width: 180px;">
                <div id="live-clock">00:00:00</div>
                <div id="week-range">Syncing...</div>
            </div>
            <button class="nav-btn" onclick="changeWeek(1)">❯</button>
        </div>
    </div>
    <main class="grid" id="main-grid"></main>
</div>

<div id="admin-panel">
    <h2 style="color:var(--primary); margin-bottom:5px">Cloud Admin</h2>
    <p style="font-size: 11px; color: #666; margin-bottom: 20px;">Day 0 = Thứ Hai | Day 6 = Chủ Nhật</p>
    <div id="edit-fields"></div>
    <button class="save-btn" onclick="saveToCloud()">UPDATE WEB DATA</button>
    <button style="width:100%; padding:12px; background:#222; color:#fff; border:none; margin-top:10px; border-radius:12px; cursor:pointer" onclick="closeAdmin()">CLOSE</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLp6sfgO6WR53RbfXMoU1RV9ROBmOHuQI",
        authDomain: "epstudyroom-bacaf.firebaseapp.com",
        projectId: "epstudyroom-bacaf",
        storageBucket: "epstudyroom-bacaf.firebasestorage.app",
        messagingSenderId: "189256681520",
        appId: "1:189256681520:web:28a61a58628754b490c5f5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const DateTime = luxon.DateTime;
    let weekOffset = 0;

    let cfg = {
        title: "EP STUDY ROOM",
        days: Array(7).fill({m: "07:30", a: "14:00", e: "19:30"})
    };

    db.collection("settings").doc("schedule").onSnapshot((doc) => {
        if (doc.exists) { cfg = doc.data(); render(); }
    });

    function render() {
        const now = DateTime.now().setZone("Asia/Ho_Chi_Minh");
        // Force start of week to Monday
        const startOfWeek = now.plus({ weeks: weekOffset }).startOf('week');
        
        document.getElementById('display-title').innerText = cfg.title;
        document.getElementById('week-range').innerText = `${startOfWeek.toFormat('dd LLL')} - ${startOfWeek.plus({days:6}).toFormat('dd LLL, yyyy')}`;
        
        const grid = document.getElementById('main-grid'); 
        grid.innerHTML = "";

        // Dữ liệu trong cfg.days: [0]=Mon, [1]=Tue, ... [6]=Sun
        for(let i=0; i<7; i++) {
            const actualDate = startOfWeek.plus({ days: i });
            const isToday = now.hasSame(actualDate, 'day');
            const d = cfg.days[i];
            
            let html = `<div class="card ${isToday ? 'today' : ''}">
                <div class="day-label">${actualDate.toFormat('cccc')}</div>
                <span class="date-label">${actualDate.toFormat('dd LLL')}</span>`;
            
            const sessions = [
                {k: 'm', l: 'Morning'}, 
                {k: 'a', l: 'Afternoon'}, 
                {k: 'e', l: 'Evening'}
            ];

            sessions.forEach(s => {
                let tStr = d[s.k];
                let disp = "---", active = false;
                if(tStr && tStr.toLowerCase() !== 'off') {
                    disp = tStr;
                    // Check active (khoảng 1 tiếng quanh mốc giờ)
                    const tObj = DateTime.fromFormat(tStr, "HH:mm", {zone: "Asia/Ho_Chi_Minh"}).set({
                        year: actualDate.year, month: actualDate.month, day: actualDate.day
                    });
                    active = isToday && Math.abs(now.diff(tObj, 'minutes').minutes) < 60;
                }
                html += `<div class="session ${active ? 'active-now' : ''}">
                    <span class="s-name">${s.l}</span>
                    <span class="s-time">${disp}</span>
                </div>`;
            });
            grid.innerHTML += html + `</div>`;
        }
    }

    function login() { if(prompt("Admin Pass:") === "hottea68") { document.getElementById('admin-panel').classList.add('open'); initEdit(); } }
    function closeAdmin() { document.getElementById('admin-panel').classList.remove('open'); }
    
    function initEdit() {
        const wrap = document.getElementById('edit-fields');
        const dayNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        wrap.innerHTML = `<label>Title</label><input id="in-title" value="${cfg.title}">`;
        cfg.days.forEach((d, i) => {
            wrap.innerHTML += `<div style="margin-top:10px;">
                <span style="color:var(--primary); font-size:12px; font-weight:bold">${dayNames[i]} (Day ${i})</span>
                <div style="display:flex;gap:5px">
                    <input id="m-${i}" value="${d.m}" placeholder="07:30">
                    <input id="a-${i}" value="${d.a}" placeholder="14:00">
                    <input id="e-${i}" value="${d.e}" placeholder="19:30">
                </div>
            </div>`;
        });
    }

    function saveToCloud() {
        cfg.title = document.getElementById('in-title').value;
        cfg.days = [];
        for(let i=0; i<7; i++) {
            cfg.days.push({
                m: document.getElementById(`m-${i}`).value,
                a: document.getElementById(`a-${i}`).value,
                e: document.getElementById(`e-${i}`).value
            });
        }
        db.collection("settings").doc("schedule").set(cfg).then(() => { 
            alert("Updated! Lịch đã được đồng bộ chuẩn Thứ Hai -> Chủ Nhật."); 
            closeAdmin(); 
        });
    }

    setInterval(() => {
        document.getElementById('live-clock').innerText = DateTime.now().setZone("Asia/Ho_Chi_Minh").toFormat('HH:mm:ss');
    }, 1000);
    function changeWeek(dir) { weekOffset += dir; render(); }
</script>
</body>
</html>
