<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EP STUDY ROOM | SWEET PASTEL PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --p-pink: #ffdae9; --p-purple: #dcd0ff; --p-blue: #c4e1eb;
            --text: #4a4a6a; --glass: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.6);
            --accent: #ff7da3;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym49.cur'), auto; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 50%, #f3e5f5 100%);
            color: var(--text); min-height: 100vh; overflow-x: hidden; 
            display: flex; flex-direction: column; align-items: center; 
        }

        /* Nền mây bay chậm hơn, nghệ hơn */
        .cloud-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .cloud { position: absolute; background: white; border-radius: 100px; filter: blur(60px); animation: float 45s infinite linear; opacity: 0.4; }
        @keyframes float { 0% { transform: translateX(-400px) translateY(0); } 50% { transform: translateX(50vw) translateY(20px); } 100% { transform: translateX(110vw) translateY(0); } }

        .container { width: 94%; max-width: 1400px; padding: 40px 0; z-index: 1; }
        
        header h1 { 
            font-size: clamp(2.5rem, 7vw, 3.5rem); font-weight: 800; text-align: center; 
            letter-spacing: -3px; margin-bottom: 5px; color: var(--accent);
            text-shadow: 0 10px 20px rgba(255,125,163,0.1); cursor: pointer;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        header h1:hover { transform: scale(1.03) rotate(-1deg); filter: drop-shadow(0 0 15px var(--p-pink)); }

        #tz-status { 
            font-size: 10px; font-weight: 800; text-align: center; color: #8e8ea8; 
            margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px;
            opacity: 0; animation: fadeIn 1s forwards 0.5s;
        }

        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); border: 1px solid var(--border);
            padding: 15px 30px; border-radius: 60px; margin-bottom: 50px;
            box-shadow: var(--shadow); backdrop-filter: blur(20px);
            animation: slideDown 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }

        .controls { display: flex; align-items: center; gap: 20px; }
        
        .week-nav { display: flex; gap: 15px; align-items: center; background: rgba(255,255,255,0.5); padding: 8px 20px; border-radius: 30px; border: 1px solid white; transition: 0.3s; }
        .week-nav:hover { background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .nav-btn { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .nav-btn:hover { transform: scale(1.5); }
        #week-range { font-family: 'JetBrains Mono'; font-size: 13px; font-weight: 700; color: #6a6a8a; }

        .lang-toggle { display: flex; background: rgba(255,255,255,0.4); border-radius: 25px; padding: 4px; border: 1px solid rgba(255,255,255,0.5); }
        .lang-btn { background: none; border: none; color: #7a7a9a; padding: 8px 18px; font-size: 11px; font-weight: 800; cursor: pointer; border-radius: 20px; transition: 0.3s; }
        .lang-btn.active { background: #fff; color: var(--accent); box-shadow: 0 4px 12px rgba(255,125,163,0.15); }

        #live-clock { font-family: 'JetBrains Mono'; font-size: 1.5rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 20px; }
        @media (max-width: 1100px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 700px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        /* Card với hiệu ứng Entrance Anim */
        .card { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 40px; 
            padding: 30px 15px; text-align: center; 
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative; overflow: hidden; opacity: 0; transform: translateY(30px);
        }
        .card.show { opacity: 1; transform: translateY(0); }

        .card:hover { 
            transform: translateY(-15px) scale(1.02); 
            background: white; border-color: var(--accent);
            box-shadow: 0 25px 50px rgba(255,125,163,0.15);
        }

        .card.today { border-color: var(--accent); background: #fff; box-shadow: 0 15px 35px rgba(255,125,163,0.2); }
        .card.today::after { content: 'TODAY'; position: absolute; top: 12px; right: -20px; background: var(--accent); color: white; font-size: 9px; font-weight: 800; padding: 3px 25px; transform: rotate(45deg); }

        .d-name { font-weight: 800; font-size: 14px; color: var(--accent); letter-spacing: 1px; display: block; margin-bottom: 2px; }
        .d-date { font-size: 11px; color: #9a9ab5; font-weight: 700; margin-bottom: 25px; display: block; opacity: 0.7; }

        .slot { 
            background: rgba(255,255,255,0.3); border-radius: 28px; padding: 20px 5px; 
            margin-bottom: 12px; min-height: 90px; display: flex; flex-direction: column; 
            justify-content: center; transition: 0.5s; border: 1px solid transparent;
        }
        .slot.active { 
            background: white; border: 1px solid var(--p-pink); 
            box-shadow: 0 8px 20px rgba(255,218,233,0.6);
            transform: scale(1.05);
        }

        .s-icon { font-size: 22px; margin-bottom: 8px; filter: grayscale(1); opacity: 0.1; transition: 0.5s; }
        .slot.active .s-icon { filter: grayscale(0); opacity: 1; transform: translateY(-3px) scale(1.1); }
        .s-label { font-size: 10px; font-weight: 800; color: #ccc; text-transform: uppercase; letter-spacing: 1px; }
        .slot.active .s-label { color: var(--accent); }
        .s-time { font-family: 'JetBrains Mono'; font-size: 1.2rem; font-weight: 800; color: var(--text); opacity: 0; transition: 0.5s; }
        .slot.active .s-time { opacity: 1; }

        #admin { position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px; height: 100vh; background: #fff; z-index: 1000; padding: 40px; box-shadow: -30px 0 60px rgba(0,0,0,0.1); transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1); overflow-y: auto; }
        #admin.open { right: 0; }
        .admin-row { background: #fbfbff; padding: 20px; border-radius: 30px; margin-bottom: 15px; border: 1px solid #f0f0ff; transition: 0.3s; }
        .admin-row:hover { border-color: var(--p-pink); background: white; }
        
        input { width: 100%; padding: 12px 18px; border: 2px solid #f0f0ff; border-radius: 15px; margin-bottom: 10px; font-family: 'JetBrains Mono'; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; background: white; box-shadow: 0 5px 15px rgba(255,125,163,0.1); }
        
        .btn-save { width: 100%; padding: 20px; background: var(--accent); color: #fff; border: none; border-radius: 30px; font-weight: 800; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 25px rgba(255,125,163,0.3); }
        .btn-save:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(255,125,163,0.4); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="cloud-bg" id="cloud-container"></div>
    <div class="container">
        <header><h1 onclick="toggleAdmin()">EP STUDY ROOM</h1></header>
        <div id="tz-status">Detecting timezone...</div>
        <div class="nav-bar">
            <div class="controls">
                <div class="lang-toggle">
                    <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
                    <button id="btn-vi" class="lang-btn" onclick="setLang('vi')">VI</button>
                </div>
                <div class="week-nav">
                    <button class="nav-btn" onclick="changeWeek(-1)">❮</button>
                    <span id="week-range">---</span>
                    <button class="nav-btn" onclick="changeWeek(1)">❯</button>
                </div>
                <select id="manual-tz" onchange="manualUpdate()"></select>
            </div>
            <div id="live-clock">00:00:00</div>
        </div>
        <main class="grid" id="main-grid"></main>
    </div>

    <div id="admin">
        <h2 style="color:var(--accent); margin-bottom:25px; text-align:center; font-weight:800; font-size:1.8rem;">Settings ✨</h2>
        <div id="admin-fields" style="margin-bottom:30px;"></div>
        <button class="btn-save" onclick="save()">SAVE CHANGES</button>
        <p style="text-align:center; margin-top:25px; color:#aaa; cursor:pointer; font-weight:700; font-size:13px;" onclick="toggleAdmin()">CLOSE PANEL</p>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLp6sfgO6WR53RbfXMoU1RV9ROBmOHuQI",
        authDomain: "epstudyroom-bacaf.firebaseapp.com",
        projectId: "epstudyroom-bacaf",
        storageBucket: "epstudyroom-bacaf.firebasestorage.app",
        messagingSenderId: "189256681520",
        appId: "1:189256681520:web:28a61a58628754b490c5f5",
        measurementId: "G-XNC0QYGSG6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const DT = luxon.DateTime;

    let daysArray = []; 
    let userTZ = DT.local().zoneName; 
    let userLang = 'en'; 
    let weekOffset = 0;
    let isAutoTZ = true;

    const i18n = {
        en: { days: ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY","SUNDAY"], slots: ["Morning","Afternoon","Evening"], tzText: "Timezone:", auto: "Auto", manual: "Manual" },
        vi: { days: ["THỨ HAI","THỨ BA","THỨ TƯ","THỨ NĂM","THỨ SÁU","THỨ BẢY","CHỦ NHẬT"], slots: ["Sáng","Chiều","Tối"], tzText: "Múi giờ:", auto: "Tự động", manual: "Thủ công" }
    };

    db.collection("settings").doc("schedule").onSnapshot(doc => {
        if (doc.exists) {
            daysArray = doc.data().days || [];
            render();
        }
    });

    function initClouds() {
        const container = document.getElementById('cloud-container');
        for(let i=0; i<10; i++) {
            let c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = Math.random()*350 + 200 + 'px';
            c.style.height = c.style.width;
            c.style.top = Math.random()*100 + 'vh';
            c.style.left = '-400px';
            c.style.animationDelay = Math.random()*35 + 's';
            container.appendChild(c);
        }
    }

    function setLang(lang) { 
        userLang = lang; 
        document.getElementById('main-grid').style.opacity = 0;
        setTimeout(() => { render(); document.getElementById('main-grid').style.opacity = 1; }, 200);
    }

    function changeWeek(n) { 
        weekOffset += n; 
        document.getElementById('main-grid').style.transform = `translateX(${n > 0 ? '-20px' : '20px'})`;
        document.getElementById('main-grid').style.opacity = 0;
        setTimeout(() => {
            render();
            document.getElementById('main-grid').style.transform = 'translateX(0)';
            document.getElementById('main-grid').style.opacity = 1;
        }, 300);
    }

    const tzs = ["Asia/Ho_Chi_Minh","America/New_York","Europe/London","Asia/Tokyo","Australia/Sydney","Asia/Seoul"];
    const tzSelect = document.getElementById('manual-tz');
    tzSelect.innerHTML = `<option value="auto">🌍 Automatic</option>` + tzs.map(t => `<option value="${t}">${t.split('/').pop().replace('_', ' ')}</option>`).join('');

    function manualUpdate() {
        const val = tzSelect.value;
        if(val === 'auto') { userTZ = DT.local().zoneName; isAutoTZ = true; } 
        else { userTZ = val; isAutoTZ = false; }
        render();
    }

    function render() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = "";
        const now = DT.now().setZone(userTZ);
        const startOfThisWeek = now.startOf('week');
        const displayWeekStart = startOfThisWeek.plus({ weeks: weekOffset });
        
        const lang = i18n[userLang];
        document.getElementById('tz-status').innerText = `📍 ${lang.tzText} ${userTZ.replace('_', ' ')} (${isAutoTZ ? lang.auto : lang.manual})`;
        document.getElementById('week-range').innerText = `${displayWeekStart.toFormat('dd LLL')} - ${displayWeekStart.plus({days:6}).toFormat('dd LLL')}`;

        document.getElementById('btn-en').classList.toggle('active', userLang === 'en');
        document.getElementById('btn-vi').classList.toggle('active', userLang === 'vi');

        for(let i=0; i<7; i++) {
            const date = displayWeekStart.plus({ days: i });
            const data = daysArray[i] || {m:"", a:"", e:""};
            const isToday = now.hasSame(date, 'day');

            let card = document.createElement('div');
            card.className = `card ${isToday ? 'today' : ''}`;
            
            // Hiệu ứng mọc lần lượt (Staggered)
            setTimeout(() => card.classList.add('show'), i * 100);

            let h = `<span class="d-name">${lang.days[i]}</span>
                     <span class="d-date">${date.toFormat('dd/MM/yyyy')}</span>`;

            ['m','a','e'].forEach((k, idx) => {
                const raw = (data[k] || "").trim();
                const valid = /^([01]\d|2[0-3]):([0-5]\d)$/.test(raw);
                let timeStr = "---";
                if(valid) {
                    timeStr = DT.fromFormat(raw, "HH:mm", {zone: "Asia/Ho_Chi_Minh"}).set({
                        year: date.year, month: date.month, day: date.day
                    }).setZone(userTZ).toFormat("HH:mm");
                }
                h += `<div class="slot ${valid ? 'active' : ''}">
                    <span class="s-icon">${["☀️", "☕", "🌙"][idx]}</span>
                    <span class="s-label">${lang.slots[idx]}</span>
                    <div class="s-time">${timeStr}</div>
                </div>`;
            });
            card.innerHTML = h;
            grid.appendChild(card);
        }
    }

    function toggleAdmin() {
        const admin = document.getElementById('admin');
        if(!admin.classList.contains('open')) {
            if(prompt("Admin Access Code?") !== "hottea68") return;
            const div = document.getElementById('admin-fields');
            div.innerHTML = "";
            const lang = i18n[userLang];
            for(let i=0; i<7; i++) {
                const d = daysArray[i] || {m:"", a:"", e:""};
                div.innerHTML += `<div class="admin-row">
                    <p style="font-size:13px; font-weight:800; color:var(--accent); margin-bottom:12px;">📅 ${lang.days[i]}</p>
                    <input class="in-m" data-idx="${i}" value="${d.m}" placeholder="Morning (HH:mm)">
                    <input class="in-a" data-idx="${i}" value="${d.a}" placeholder="Afternoon (HH:mm)">
                    <input class="in-e" data-idx="${i}" value="${d.e}" placeholder="Evening (HH:mm)">
                </div>`;
            }
            admin.classList.add('open');
        } else { admin.classList.remove('open'); }
    }

    async function save() {
        const btn = document.querySelector('.btn-save');
        btn.innerText = "SAVING...";
        const newDays = [];
        for(let i=0; i<7; i++) {
            const row = document.querySelector(`.in-m[data-idx="${i}"]`).parentElement;
            newDays.push({
                m: row.querySelector('.in-m').value,
                a: row.querySelector('.in-a').value,
                e: row.querySelector('.in-e').value
            });
        }
        try {
            await db.collection("settings").doc("schedule").update({ days: newDays });
            btn.innerText = "SUCCESS! ✨";
            setTimeout(() => {
                btn.innerText = "SAVE CHANGES";
                document.getElementById('admin').classList.remove('open');
            }, 1000);
        } catch (e) { 
            alert("Error: " + e.message); 
            btn.innerText = "SAVE CHANGES";
        }
    }

    initClouds(); 
    render();
    setInterval(() => { 
        document.getElementById('live-clock').innerText = DT.now().setZone(userTZ).toFormat('HH:mm:ss'); 
    }, 1000);
</script>
</body>
</html>
