<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EP STUDY ROOM | SWEET PASTEL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --p-pink: #ffdae9; --p-purple: #e2d5ff; --p-blue: #d0f4ff;
            --text: #5a5a7a; --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(255, 255, 255, 0.5);
            --accent: #ff8fb1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym49.cur'), auto; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1f9 100%);
            color: var(--text); min-height: 100vh; overflow-x: hidden; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .cloud-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; opacity: 0.6; }
        .cloud { position: absolute; background: white; border-radius: 100px; filter: blur(30px); animation: float 20s infinite linear; }

        @keyframes float {
            0% { transform: translateX(-200px); }
            100% { transform: translateX(100vw); }
        }

        .container { width: 94%; max-width: 1400px; padding: 40px 0; z-index: 1; }
        
        header h1 { 
            font-size: clamp(2rem, 6vw, 2.5rem); font-weight: 800; text-align: center; 
            letter-spacing: -1px; margin-bottom: 5px; color: var(--accent);
            text-shadow: 2px 2px 0px #fff; cursor: pointer;
        }

        #tz-status {
            font-size: 11px; font-weight: 700; text-align: center; color: #a3a3c2;
            margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px;
        }

        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); border: 2px solid white;
            padding: 10px 20px; border-radius: 40px; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); backdrop-filter: blur(10px);
        }

        .controls { display: flex; align-items: center; gap: 10px; }
        
        .lang-toggle { display: flex; background: #fff; border-radius: 20px; padding: 3px; border: 1px solid #eee; }
        .lang-btn {
            background: none; border: none; color: #ccc; padding: 5px 12px;
            font-size: 10px; font-weight: 800; cursor: pointer; border-radius: 15px;
        }
        .lang-btn.active { background: var(--p-pink); color: var(--accent); }

        .week-nav { 
            display: flex; gap: 10px; align-items: center; 
            background: #fff; padding: 5px 15px; border-radius: 25px; border: 1px solid #eee;
        }
        .nav-btn { background: none; border: none; color: var(--accent); font-size: 18px; cursor: pointer; transition: 0.2s; }
        .nav-btn:hover { transform: scale(1.3); }
        
        #week-range { font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 700; color: #7a7a9a; }
        #live-clock { font-family: 'JetBrains Mono'; font-size: 1.2rem; font-weight: 700; color: var(--accent); }

        select { 
            background: #fff; border: 1px solid #eee; color: var(--text); 
            padding: 6px 12px; border-radius: 20px; font-size: 11px; outline: none;
        }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; }
        @media (max-width: 1100px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 700px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        .card { 
            background: var(--glass); border: 2px solid white; border-radius: 35px;
            padding: 20px 10px; text-align: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(255,143,177,0.15); border-color: var(--p-pink); }
        .card.today { border-color: var(--accent); background: #fff; }

        .d-name { font-weight: 800; font-size: 13px; color: var(--accent); }
        .d-date { font-size: 10px; color: #aaa; font-weight: 700; margin-bottom: 20px; display: block; }

        .slot { 
            background: rgba(255,255,255,0.4); border-radius: 22px; padding: 15px 5px; margin-bottom: 8px;
            border: 1px solid transparent; min-height: 80px; display: flex; flex-direction: column; justify-content: center;
        }
        .slot.active { 
            background: #fff; border-color: var(--p-pink);
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .s-icon { font-size: 18px; margin-bottom: 5px; opacity: 0.1; transition: 0.3s; }
        .slot.active .s-icon { opacity: 1; }
        .s-label { font-size: 9px; font-weight: 800; color: #ddd; text-transform: uppercase; }
        .slot.active .s-label { color: var(--accent); }
        .s-time { font-family: 'JetBrains Mono'; font-size: 1.1rem; font-weight: 800; color: transparent; }
        .slot.active .s-time { color: var(--text); }

        #admin { position: fixed; top: 0; right: -100%; width: 100%; max-width: 350px; height: 100vh; background: #fff; z-index: 1000; padding: 30px; box-shadow: -10px 0 30px rgba(0,0,0,0.05); transition: 0.4s; }
        #admin.open { right: 0; }
        .admin-row { background: #f9f9ff; padding: 12px; border-radius: 20px; margin-bottom: 10px; border: 1px solid #eee; }
        input { width: 100%; padding: 8px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 5px; outline: none; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: 20px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div class="cloud-bg" id="cloud-container"></div>

    <div class="container">
        <header><h1 onclick="toggleAdmin()">EP STUDY ROOM</h1></header>
        <div id="tz-status">...</div>

        <div class="nav-bar">
            <div class="controls">
                <div class="lang-toggle">
                    <button id="btn-vi" class="lang-btn" onclick="setLang('vi')">VI</button>
                    <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
                </div>
                <div class="week-nav">
                    <button class="nav-btn" id="prev-week" onclick="changeWeek(-1)">❮</button>
                    <span id="week-range">---</span>
                    <button class="nav-btn" onclick="changeWeek(1)">❯</button>
                </div>
                <select id="manual-tz" onchange="manualUpdate()"></select>
            </div>
            <div id="live-clock">00:00:00</div>
        </div>

        <main class="grid" id="main-grid"></main>
    </div>

    <div id="admin">
        <h2 style="color:var(--accent); margin-bottom:20px;">Admin Mode ✨</h2>
        <div id="admin-fields" style="max-height:70vh; overflow-y:auto; margin-bottom:20px;"></div>
        <button class="btn-save" onclick="save()">SAVE CHANGES</button>
        <p style="text-align:center; margin-top:20px; opacity:0.3; cursor:pointer;" onclick="toggleAdmin()">Close</p>
    </div>

<script>
    // ĐÃ TỰ ĐỘNG ĐIỀN MÃ FIREBASE TỪ ẢNH CỦA BẠN
    const firebaseConfig = {
        apiKey: "AIzaSyBLp6sfgO6WR53RbfXMoU1RV9ROBmOHuQI",
        authDomain: "epstudyroom-bacaf.firebaseapp.com",
        projectId: "epstudyroom-bacaf",
        storageBucket: "epstudyroom-bacaf.firebasestorage.app",
        messagingSenderId: "189256681520",
        appId: "1:189256681520:web:28a61a58628754b490c5f5",
        measurementId: "G-XNC0QYGSG6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const DT = luxon.DateTime;

    let schedule = { days: [] };
    let userTZ = DT.local().zoneName;
    let userLang = 'en';
    let weekOffset = 0;
    let isAutoTZ = true;

    const i18n = {
        vi: { days: ["Thứ Hai","Thứ Ba","Thứ Tư","Thứ Năm","Thứ Sáu","Thứ Bảy","Chủ Nhật"], slots: ["Sáng","Chiều","Tối"], tzText: "Lịch theo:", auto: "Tự động", manual: "Thủ công" },
        en: { days: ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"], slots: ["Morning","Afternoon","Evening"], tzText: "Timezone:", auto: "Auto", manual: "Manual" }
    };

    function initClouds() {
        const container = document.getElementById('cloud-container');
        for(let i=0; i<6; i++) {
            let c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = Math.random()*200 + 100 + 'px';
            c.style.height = c.style.width;
            c.style.top = Math.random()*100 + 'vh';
            c.style.left = '-200px';
            c.style.animationDelay = Math.random()*20 + 's';
            container.appendChild(c);
        }
    }

    function initLang() {
        const saved = localStorage.getItem('ep_lang');
        userLang = saved || (navigator.language.startsWith('vi') ? 'vi' : 'en');
        updateLangUI();
    }

    function setLang(lang) {
        userLang = lang;
        localStorage.setItem('ep_lang', lang);
        updateLangUI();
        render();
    }

    function updateLangUI() {
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${userLang}`).classList.add('active');
    }

    const tzs = ["Asia/Ho_Chi_Minh","America/New_York","Europe/London","Asia/Tokyo","Australia/Sydney"];
    const tzSelect = document.getElementById('manual-tz');
    tzSelect.innerHTML = `<option value="auto">🌍 Local Time</option>` + tzs.map(t => `<option value="${t}">${t}</option>`).join('');

    db.collection("settings").doc("schedule").onSnapshot(doc => {
        if(doc.exists) { schedule = doc.data(); render(); }
    });

    function changeWeek(n) { weekOffset += n; render(); }

    function manualUpdate() {
        const val = tzSelect.value;
        if(val === 'auto') { userTZ = DT.local().zoneName; isAutoTZ = true; }
        else { userTZ = val; isAutoTZ = false; }
        render();
    }

    function render() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = "";
        const now = DT.now().setZone(userTZ);
        const startOfThisWeek = now.startOf('week');
        const displayWeekStart = startOfThisWeek.plus({ weeks: weekOffset });
        const displayWeekEnd = displayWeekStart.plus({ days: 6 });
        
        const lang = i18n[userLang];
        const icons = ["☀️", "☕", "🌙"];

        document.getElementById('tz-status').innerText = `📍 ${lang.tzText} ${userTZ.split('/').pop()} (${isAutoTZ ? lang.auto : lang.manual})`;
        document.getElementById('week-range').innerText = `${displayWeekStart.toFormat('dd LLL')} - ${displayWeekEnd.toFormat('dd LLL')}`;
        document.getElementById('prev-week').disabled = (weekOffset <= -1);

        for(let i=0; i<7; i++) {
            const date = displayWeekStart.plus({ days: i });
            const data = (schedule.
