<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EP STUDY ROOM | SWEET PASTEL PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --p-pink: #ffdae9; --p-purple: #dcd0ff; --p-blue: #c4e1eb;
            --text: #4a4a6a; --glass: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.6);
            --accent: #ff7da3;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym49.cur'), auto; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 50%, #f3e5f5 100%);
            color: var(--text); min-height: 100vh; overflow-x: hidden; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .cloud-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .cloud { position: absolute; background: white; border-radius: 100px; filter: blur(50px); animation: float 30s infinite linear; opacity: 0.5; }

        @keyframes float { 0% { transform: translateX(-300px) scale(1); } 50% { transform: translateX(50vw) scale(1.1); } 100% { transform: translateX(110vw) scale(1); } }

        .container { width: 94%; max-width: 1400px; padding: 40px 0; z-index: 1; }
        
        header h1 { 
            font-size: clamp(2rem, 6vw, 3rem); font-weight: 800; text-align: center; 
            letter-spacing: -2px; margin-bottom: 5px; color: var(--accent);
            text-shadow: 3px 3px 6px rgba(255,255,255,0.9); cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        header h1:hover { transform: scale(1.05); filter: drop-shadow(0 0 10px var(--p-pink)); }

        #tz-status { 
            font-size: 11px; font-weight: 700; text-align: center; color: #8e8ea8; 
            margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px;
            animation: fadeInDown 1s ease;
        }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }

        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); border: 1px solid var(--border);
            padding: 12px 25px; border-radius: 50px; margin-bottom: 40px;
            box-shadow: var(--shadow); backdrop-filter: blur(15px);
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .controls { display: flex; align-items: center; gap: 15px; }
        .lang-toggle { display: flex; background: rgba(255,255,255,0.4); border-radius: 20px; padding: 4px; border: 1px solid rgba(255,255,255,0.5); }
        .lang-btn { background: none; border: none; color: #7a7a9a; padding: 6px 15px; font-size: 11px; font-weight: 800; cursor: pointer; border-radius: 15px; transition: 0.3s; }
        .lang-btn.active { background: #fff; color: var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        #live-clock { font-family: 'JetBrains Mono'; font-size: 1.4rem; font-weight: 700; color: var(--accent); letter-spacing: -1px; }

        select { 
            background: rgba(255,255,255,0.7); border: 1px solid var(--border); color: var(--text); 
            padding: 8px 15px; border-radius: 20px; font-size: 12px; outline: none; transition: 0.3s;
        }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 18px; }
        @media (max-width: 1100px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 700px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        .card { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 35px; 
            padding: 25px 15px; text-align: center; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            position: relative; overflow: hidden;
            animation: cardAppear 0.7s cubic-bezier(0.165, 0.84, 0.44, 1) backwards;
        }

        .card:hover { 
            transform: translateY(-12px); 
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--p-pink);
            box-shadow: 0 20px 40px rgba(255,125,163,0.15);
        }
        .card.today { border-color: var(--accent); background: #fff; box-shadow: 0 15px 35px rgba(255,125,163,0.2); }

        @keyframes cardAppear { from { opacity: 0; transform: translateY(30px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .d-name { font-weight: 800; font-size: 14px; color: var(--accent); letter-spacing: 0.5px; }
        .d-date { font-size: 11px; color: #9a9ab5; font-weight: 700; margin-bottom: 20px; display: block; }

        .slot { 
            background: rgba(255,255,255,0.3); border-radius: 24px; padding: 18px 5px; 
            margin-bottom: 10px; min-height: 85px; display: flex; flex-direction: column; 
            justify-content: center; transition: 0.4s ease; border: 1px solid transparent;
        }
        .slot.active { 
            background: white; border: 1px solid var(--p-pink); 
            box-shadow: 0 5px 15px rgba(255,218,233,0.5);
            animation: activePulse 2s infinite ease-in-out; 
        }

        @keyframes activePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); border-color: var(--accent); } }

        .s-icon { font-size: 20px; margin-bottom: 5px; opacity: 0.1; transition: 0.5s ease; filter: grayscale(1); }
        .slot.active .s-icon { opacity: 1; filter: grayscale(0); transform: translateY(-2px); }
        .s-label { font-size: 10px; font-weight: 800; color: #ccc; text-transform: uppercase; transition: 0.5s; }
        .slot.active .s-label { color: var(--accent); }
        .s-time { font-family: 'JetBrains Mono'; font-size: 1.15rem; font-weight: 800; color: var(--text); opacity: 0; transition: 0.5s; }
        .slot.active .s-time { opacity: 1; }

        #admin { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh; background: #fff; z-index: 1000; padding: 30px; box-shadow: -20px 0 50px rgba(0,0,0,0.1); transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); overflow-y: auto; }
        #admin.open { right: 0; }
        .admin-row { background: #fbfbff; padding: 15px; border-radius: 25px; margin-bottom: 12px; border: 1px solid #f0f0ff; }
        input { width: 100%; padding: 10px 15px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 8px; outline: none; transition: 0.3s; font-family: 'JetBrains Mono'; }
        .btn-save { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 25px; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(255,125,163,0.2); }
    </style>
</head>
<body>
    <div class="cloud-bg" id="cloud-container"></div>
    <div class="container">
        <header><h1 onclick="toggleAdmin()">EP STUDY ROOM</h1></header>
        <div id="tz-status">Detecting timezone...</div>
        <div class="nav-bar">
            <div class="controls">
                <div class="lang-toggle">
                    <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
                    <button id="btn-vi" class="lang-btn" onclick="setLang('vi')">VI</button>
                </div>
                <select id="manual-tz" onchange="manualUpdate()"></select>
            </div>
            <div id="live-clock">00:00:00</div>
        </div>
        <main class="grid" id="main-grid"></main>
    </div>

    <div id="admin">
        <h2 style="color:var(--accent); margin-bottom:20px; text-align:center; font-weight:800;">Management Panel ✨</h2>
        <div id="admin-fields" style="margin-bottom:25px;"></div>
        <button class="btn-save" onclick="save()">APPLY CHANGES</button>
        <p style="text-align:center; margin-top:20px; color:#aaa; cursor:pointer; font-weight:600;" onclick="toggleAdmin()">Back to Schedule</p>
    </div>

<script>
    // Config lấy từ hình ảnh của bạn
    const firebaseConfig = {
        apiKey: "AIzaSyBLp6sfgO6WR53RbfXMoU1RV9ROBmOHuQI",
        authDomain: "epstudyroom-bacaf.firebaseapp.com",
        projectId: "epstudyroom-bacaf",
        storageBucket: "epstudyroom-bacaf.firebasestorage.app",
        messagingSenderId: "189256681520",
        appId: "1:189256681520:web:28a61a58628754b490c5f5",
        measurementId: "G-XNC0QYGSG6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const DT = luxon.DateTime;

    let daysArray = []; // Mảng chứa 7 ngày lấy từ Firestore
    let userTZ = DT.local().zoneName; 
    let userLang = 'en'; 
    let isAutoTZ = true;

    const i18n = {
        en: { days: ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY","SUNDAY"], slots: ["Morning","Afternoon","Evening"], tzText: "Timezone:", auto: "Auto", manual: "Manual" },
        vi: { days: ["THỨ HAI","THỨ BA","THỨ TƯ","THỨ NĂM","THỨ SÁU","THỨ BẢY","CHỦ NHẬT"], slots: ["Sáng","Chiều","Tối"], tzText: "Múi giờ:", auto: "Tự động", manual: "Thủ công" }
    };

    // Lắng nghe dữ liệu đúng từ Collection 'settings' Document 'schedule'
    db.collection("settings").doc("schedule").onSnapshot(doc => {
        if (doc.exists) {
            daysArray = doc.data().days || [];
            render();
        }
    });

    function initClouds() {
        const container = document.getElementById('cloud-container');
        for(let i=0; i<8; i++) {
            let c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = Math.random()*300 + 200 + 'px';
            c.style.height = c.style.width;
            c.style.top = Math.random()*100 + 'vh';
            c.style.left = '-350px';
            c.style.animationDelay = Math.random()*25 + 's';
            container.appendChild(c);
        }
    }

    function setLang(lang) { userLang = lang; render(); }

    const tzs = ["Asia/Ho_Chi_Minh","America/New_York","Europe/London","Asia/Tokyo","Australia/Sydney","Asia/Seoul"];
    const tzSelect = document.getElementById('manual-tz');
    tzSelect.innerHTML = `<option value="auto">🌍 Automatic</option>` + tzs.map(t => `<option value="${t}">${t.split('/').pop().replace('_', ' ')}</option>`).join('');

    function manualUpdate() {
        const val = tzSelect.value;
        if(val === 'auto') { userTZ = DT.local().zoneName; isAutoTZ = true; } 
        else { userTZ = val; isAutoTZ = false; }
        render();
    }

    function render() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = "";
        const now = DT.now().setZone(userTZ);
        const startOfWeek = now.startOf('week');
        
        const lang = i18n[userLang];
        document.getElementById('tz-status').innerText = `📍 ${lang.tzText} ${userTZ.replace('_', ' ')} (${isAutoTZ ? lang.auto : lang.manual})`;
        
        document.getElementById('btn-en').classList.toggle('active', userLang === 'en');
        document.getElementById('btn-vi').classList.toggle('active', userLang === 'vi');

        // Render 7 ngày dựa trên mảng 'days' từ Firestore
        for(let i=0; i<7; i++) {
            const date = startOfWeek.plus({ days: i });
            const data = daysArray[i] || {m:"", a:"", e:""};
            const isToday = now.hasSame(date, 'day');

            let card = document.createElement('div');
            card.className = `card ${isToday ? 'today' : ''}`;
            card.style.animationDelay = `${i * 0.1}s`;

            let h = `<span class="d-name">${lang.days[i]}</span>
                     <span class="d-date">${date.toFormat('dd/MM/yyyy')}</span>`;

            ['m','a','e'].forEach((k, idx) => {
                const raw = (data[k] || "").trim();
                const valid = /^([01]\d|2[0-3]):([0-5]\d)$/.test(raw);
                let timeStr = "---";
                if(valid) {
                    // Chuyển đổi từ giờ VN sang giờ khách truy cập
                    timeStr = DT.fromFormat(raw, "HH:mm", {zone: "Asia/Ho_Chi_Minh"}).set({
                        year: date.year, month: date.month, day: date.day
                    }).setZone(userTZ).toFormat("HH:mm");
                }
                h += `<div class="slot ${valid ? 'active' : ''}">
                    <span class="s-icon">${["☀️", "☕", "🌙"][idx]}</span>
                    <span class="s-label">${lang.slots[idx]}</span>
                    <div class="s-time">${timeStr}</div>
                </div>`;
            });
            card.innerHTML = h;
            grid.appendChild(card);
        }
    }

    function toggleAdmin() {
        const admin = document.getElementById('admin');
        if(!admin.classList.contains('open')) {
            if(prompt("Admin Access Code?") !== "hottea68") return;
            const div = document.getElementById('admin-fields');
            div.innerHTML = "";
            const lang = i18n[userLang];

            for(let i=0; i<7; i++) {
                const d = daysArray[i] || {m:"", a:"", e:""};
                div.innerHTML += `<div class="admin-row">
                    <p style="font-size:12px; font-weight:800; color:var(--accent); margin-bottom:8px;">📅 ${lang.days[i]}</p>
                    <input class="in-m" data-idx="${i}" value="${d.m}" placeholder="Morning (HH:mm)">
                    <input class="in-a" data-idx="${i}" value="${d.a}" placeholder="Afternoon (HH:mm)">
                    <input class="in-e" data-idx="${i}" value="${d.e}" placeholder="Evening (HH:mm)">
                </div>`;
            }
            admin.classList.add('open');
        } else { admin.classList.remove('open'); }
    }

    async function save() {
        const newDays = [];
        for(let i=0; i<7; i++) {
            const row = document.querySelector(`.in-m[data-idx="${i}"]`).parentElement;
            newDays.push({
                m: row.querySelector('.in-m').value,
                a: row.querySelector('.in-a').value,
                e: row.querySelector('.in-e').value
            });
        }

        try {
            await db.collection("settings").doc("schedule").update({ days: newDays });
            alert("Schedule updated successfully! ✨");
            document.getElementById('admin').classList.remove('open');
        } catch (e) { alert("Error: " + e.message); }
    }

    initClouds(); 
    setInterval(() => { 
        document.getElementById('live-clock').innerText = DT.now().setZone(userTZ).toFormat('HH:mm:ss'); 
    }, 1000);
</script>
</body>
</html>
