<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EP STUDY ROOM | SWEET PASTEL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --p-pink: #ffdae9; --p-purple: #dcd0ff; --p-blue: #c4e1eb;
            --text: #4a4a6a; --glass: rgba(255, 255, 255, 0.5);
            --border: rgba(255, 255, 255, 0.4);
            --accent: #ff7da3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym49.cur'), auto; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #e0e0f0 0%, #d4e4f7 50%, #e8d5f5 100%);
            color: var(--text); min-height: 100vh; overflow-x: hidden; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .cloud-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; opacity: 0.4; }
        .cloud { position: absolute; background: white; border-radius: 100px; filter: blur(40px); animation: float 25s infinite linear; }

        @keyframes float { 0% { transform: translateX(-200px); } 100% { transform: translateX(100vw); } }

        .container { width: 94%; max-width: 1400px; padding: 40px 0; z-index: 1; }
        
        header h1 { 
            font-size: clamp(2rem, 6vw, 2.5rem); font-weight: 800; text-align: center; 
            letter-spacing: -1px; margin-bottom: 5px; color: var(--accent);
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8); cursor: pointer;
        }

        #tz-status { font-size: 11px; font-weight: 700; text-align: center; color: #8e8ea8; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }

        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); border: 2px solid var(--border);
            padding: 10px 20px; border-radius: 40px; margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.03); backdrop-filter: blur(12px);
        }

        .controls { display: flex; align-items: center; gap: 10px; }
        .lang-toggle { display: flex; background: rgba(255,255,255,0.5); border-radius: 20px; padding: 3px; border: 1px solid rgba(0,0,0,0.05); }
        .lang-btn { background: none; border: none; color: #999; padding: 5px 12px; font-size: 10px; font-weight: 800; cursor: pointer; border-radius: 15px; }
        .lang-btn.active { background: var(--accent); color: white; }

        .week-nav { display: flex; gap: 10px; align-items: center; background: rgba(255,255,255,0.5); padding: 5px 15px; border-radius: 25px; border: 1px solid rgba(0,0,0,0.05); }
        .nav-btn { background: none; border: none; color: var(--accent); font-size: 18px; cursor: pointer; transition: 0.2s; }
        
        #week-range { font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 700; color: #6a6a8a; }
        #live-clock { font-family: 'JetBrains Mono'; font-size: 1.2rem; font-weight: 700; color: var(--accent); }

        select { background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.05); color: var(--text); padding: 6px 12px; border-radius: 20px; font-size: 11px; outline: none; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; }
        @media (max-width: 1100px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 700px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 30px; padding: 20px 10px; text-align: center; transition: all 0.4s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .card.today { border-color: var(--accent); background: rgba(255, 255, 255, 0.9); box-shadow: 0 10px 25px rgba(255,125,163,0.1); }

        .d-name { font-weight: 800; font-size: 13px; color: var(--accent); }
        .d-date { font-size: 10px; color: #8a8a9a; font-weight: 700; margin-bottom: 20px; display: block; }

        .slot { background: rgba(0,0,0,0.03); border-radius: 20px; padding: 15px 5px; margin-bottom: 8px; min-height: 80px; display: flex; flex-direction: column; justify-content: center; }
        .slot.active { background: white; border: 1px solid var(--p-pink); animation: bounce 2s infinite ease-in-out; }

        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        .s-icon { font-size: 18px; margin-bottom: 5px; opacity: 0.1; }
        .slot.active .s-icon { opacity: 1; }
        .s-label { font-size: 9px; font-weight: 800; color: #bbb; text-transform: uppercase; }
        .slot.active .s-label { color: var(--accent); }
        .s-time { font-family: 'JetBrains Mono'; font-size: 1.1rem; font-weight: 800; color: var(--text); opacity: 0; }
        .slot.active .s-time { opacity: 1; }

        #admin { position: fixed; top: 0; right: -100%; width: 100%; max-width: 380px; height: 100vh; background: #fff; z-index: 1000; padding: 20px; box-shadow: -10px 0 30px rgba(0,0,0,0.05); transition: 0.4s; overflow-y: auto; }
        #admin.open { right: 0; }
        .admin-row { background: #f9f9ff; padding: 12px; border-radius: 20px; margin-bottom: 10px; border: 1px solid #eee; }
        input { width: 100%; padding: 8px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 5px; outline: none; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: 20px; font-weight: 800; cursor: pointer; position: sticky; bottom: 0; }
    </style>
</head>
<body>
    <div class="cloud-bg" id="cloud-container"></div>
    <div class="container">
        <header><h1 onclick="toggleAdmin()">EP STUDY ROOM</h1></header>
        <div id="tz-status">...</div>
        <div class="nav-bar">
            <div class="controls">
                <div class="lang-toggle">
                    <button id="btn-vi" class="lang-btn" onclick="setLang('vi')">VI</button>
                    <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
                </div>
                <div class="week-nav">
                    <button class="nav-btn" id="prev-week" onclick="changeWeek(-1)">❮</button>
                    <span id="week-range">---</span>
                    <button class="nav-btn" onclick="changeWeek(1)">❯</button>
                </div>
                <select id="manual-tz" onchange="manualUpdate()"></select>
            </div>
            <div id="live-clock">00:00:00</div>
        </div>
        <main class="grid" id="main-grid"></main>
    </div>

    <div id="admin">
        <h2 style="color:var(--accent); margin-bottom:15px; text-align:center;">Admin Schedule ✨</h2>
        <div id="admin-fields" style="margin-bottom:20px;"></div>
        <button class="btn-save" onclick="save()">SAVE ALL CHANGES</button>
        <p style="text-align:center; margin-top:15px; opacity:0.3; cursor:pointer;" onclick="toggleAdmin()">Close</p>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLp6sfgO6WR53RbfXMoU1RV9ROBmOHuQI",
        authDomain: "epstudyroom-bacaf.firebaseapp.com",
        projectId: "epstudyroom-bacaf",
        storageBucket: "epstudyroom-bacaf.firebasestorage.app",
        messagingSenderId: "189256681520",
        appId: "1:189256681520:web:28a61a58628754b490c5f5",
        measurementId: "G-XNC0QYGSG6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const DT = luxon.DateTime;

    let scheduleData = {}; 
    let userTZ = DT.local().zoneName;
    let userLang = 'vi';
    let weekOffset = 0;
    let isAutoTZ = true;

    const i18n = {
        vi: { days: ["Thứ Hai","Thứ Ba","Thứ Tư","Thứ Năm","Thứ Sáu","Thứ Bảy","Chủ Nhật"], slots: ["Sáng","Chiều","Tối"], tzText: "Múi giờ:", auto: "Tự động", manual: "Thủ công" },
        en: { days: ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"], slots: ["Morning","Afternoon","Evening"], tzText: "Timezone:", auto: "Auto", manual: "Manual" }
    };

    // Theo dõi toàn bộ dữ liệu mới (collection daily_schedules)
    db.collection("daily_schedules").onSnapshot(snapshot => {
        snapshot.forEach(doc => { scheduleData[doc.id] = doc.data(); });
        render();
    });

    function initClouds() {
        const container = document.getElementById('cloud-container');
        for(let i=0; i<6; i++) {
            let c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = Math.random()*200 + 150 + 'px';
            c.style.height = c.style.width;
            c.style.top = Math.random()*100 + 'vh';
            c.style.left = '-250px';
            c.style.animationDelay = Math.random()*20 + 's';
            container.appendChild(c);
        }
    }

    function setLang(lang) {
        userLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.id === `btn-${lang}`));
        render();
    }

    const tzs = ["Asia/Ho_Chi_Minh","America/New_York","Europe/London","Asia/Tokyo","Australia/Sydney"];
    const tzSelect = document.getElementById('manual-tz');
    tzSelect.innerHTML = `<option value="auto">🌍 Local Time</option>` + tzs.map(t => `<option value="${t}">${t}</option>`).join('');

    function changeWeek(n) { weekOffset += n; render(); }
    function manualUpdate() {
        const val = tzSelect.value;
        if(val === 'auto') { userTZ = DT.local().zoneName; isAutoTZ = true; }
        else { userTZ = val; isAutoTZ = false; }
        render();
    }

    function render() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = "";
        const now = DT.now().setZone(userTZ);
        const startOfThisWeek = now.startOf('week');
        const displayWeekStart = startOfThisWeek.plus({ weeks: weekOffset });
        
        const lang = i18n[userLang];
        document.getElementById('tz-status').innerText = `📍 ${lang.tzText} ${userTZ.split('/').pop()} (${isAutoTZ ? lang.auto : lang.manual})`;
        document.getElementById('week-range').innerText = `${displayWeekStart.toFormat('dd LLL')} - ${displayWeekStart.plus({days:6}).toFormat('dd LLL')}`;

        for(let i=0; i<7; i++) {
            const date = displayWeekStart.plus({ days: i });
            const dateId = date.toFormat('yyyy-MM-dd');
            const data = scheduleData[dateId] || {m:"", a:"", e:""};
            const isToday = now.hasSame(date, 'day');

            let h = `<div class="card ${isToday ? 'today' : ''}">
                <span class="d-name">${lang.days[i]}</span>
                <span class="d-date">${date.toFormat('dd/MM/yyyy')}</span>`;

            ['m','a','e'].forEach((k, idx) => {
                const raw = (data[k] || "").trim();
                const valid = /^([01]\d|2[0-3]):([0-5]\d)$/.test(raw);
                let timeStr = "";
                if(valid) {
                    timeStr = DT.fromFormat(raw, "HH:mm", {zone: "Asia/Ho_Chi_Minh"}).set({
                        year: date.year, month: date.month, day: date.day
                    }).setZone(userTZ).toFormat("HH:mm");
                }
                h += `<div class="slot ${valid ? 'active' : ''}">
                    <span class="s-icon">${["☀️", "☕", "🌙"][idx]}</span>
                    <span class="s-label">${lang.slots[idx]}</span>
                    <div class="s-time">${timeStr}</div>
                </div>`;
            });
            grid.innerHTML += h + `</div>`;
        }
    }

    function toggleAdmin() {
        const admin = document.getElementById('admin');
        if(!admin.classList.contains('open')) {
            if(prompt("Pass?") !== "hottea68") return;
            const div = document.getElementById('admin-fields');
            div.innerHTML = "";
            const now = DT.now();
            const startOfThisWeek = now.startOf('week').plus({ weeks: weekOffset });

            for(let i=0; i<7; i++) {
                const date = startOfThisWeek.plus({ days: i });
                const dateId = date.toFormat('yyyy-MM-dd');
                const d = scheduleData[dateId] || {m:"", a:"", e:""};
                div.innerHTML += `<div class="admin-row">
                    <p style="font-size:11px; font-weight:800; color:var(--accent); margin-bottom:5px;">${date.toFormat('cccc, dd/MM')}</p>
                    <input class="in-m" data-date="${dateId}" value="${d.m}" placeholder="Sáng (HH:mm)">
                    <input class="in-a" data-date="${dateId}" value="${d.a}" placeholder="Chiều (HH:mm)">
                    <input class="in-e" data-date="${dateId}" value="${d.e}" placeholder="Tối (HH:mm)">
                </div>`;
            }
            admin.classList.add('open');
        } else { admin.classList.remove('open'); }
    }

    async function save() {
        const rows = document.querySelectorAll('.admin-row');
        const batch = db.batch();
        
        rows.forEach(row => {
            const firstInput = row.querySelector('input');
            const dateId = firstInput.dataset.date;
            const data = {
                m: row.querySelector('.in-m').value,
                a: row.querySelector('.in-a').value,
                e: row.querySelector('.in-e').value
            };
            const ref = db.collection("daily_schedules").doc(dateId);
            batch.set(ref, data);
        });

        try {
            await batch.commit();
            alert("Updated successfully! ✨");
            document.getElementById('admin').classList.remove('open');
        } catch (e) { 
            console.error(e);
            alert("Error saving! Check Firestore Rules."); 
        }
    }

    initClouds(); setLang('vi');
    setInterval(() => { document.getElementById('live-clock').innerText = DT.now().setZone(userTZ).toFormat('HH:mm:ss'); }, 1000);
</script>
</body>
</html>
